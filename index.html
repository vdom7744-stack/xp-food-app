<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XP Питание — Ваш дневник КБЖУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ffffff;
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* Кастомные цвета для Telegram темы */
        :root {
            --tg-bg: rgba(26, 26, 46, 0.95);
            --tg-card: rgba(255, 255, 255, 0.08);
            --tg-accent: linear-gradient(135deg, #ff6b6b, #ff8e53);
            --tg-accent-color: #ff6b6b;
            --tg-border: rgba(255, 255, 255, 0.1);
        }

        /* Основной контент */
        .main-content {
            padding: 16px;
            padding-bottom: 100px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Заголовок */
        .app-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
        }

        .app-header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .app-header p {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 4px;
        }

        /* Вкладки приёмов пищи */
        .meal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
        }

        .meal-tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.7);
        }

        .meal-tab.active {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            transform: scale(1.02);
        }

        /* Сводка КБЖУ */
        .summary {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }

        .summary:hover {
            transform: translateY(-2px);
        }

        .summary-header {
            font-weight: 700;
            margin-bottom: 16px;
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        .calories-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: 700;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .macros-row {
            display: flex;
            justify-content: space-around;
            margin-top: 16px;
            gap: 12px;
        }

        .macro-item {
            text-align: center;
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .macro-value {
            font-weight: 800;
            font-size: 18px;
        }

        .macro-label {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
        }

        /* Кнопка поиска */
        .search-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .search-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(255, 107, 107, 0.3);
        }

        /* Дневник */
        .diary-list {
            margin-bottom: 16px;
        }

        .diary-item {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .diary-item:active {
            transform: scale(0.98);
        }

        .diary-info {
            flex: 1;
        }

        .diary-name {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .diary-details {
            font-size: 11px;
            opacity: 0.6;
        }

        .delete-btn {
            background: rgba(244, 67, 54, 0.9);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .delete-btn:active {
            transform: scale(0.95);
            background: #f44336;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            opacity: 0.6;
            font-size: 14px;
        }

        /* Полноэкранный поиск */
        .fullscreen-search {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a2e;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .fullscreen-search.active {
            display: flex;
        }

        .search-header {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .search-header input {
            flex: 1;
            padding: 14px 18px;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
        }

        .search-header input:focus {
            border-color: #ff6b6b;
        }

        .close-search {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: #f44336;
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .search-result-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .search-result-item.selected {
            background: rgba(255, 107, 107, 0.2);
            border-color: #ff6b6b;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-weight: 700;
            margin-bottom: 6px;
        }

        .result-calories {
            font-size: 12px;
            opacity: 0.7;
        }

        .result-macros {
            display: flex;
            gap: 12px;
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.5;
        }

        .check-icon {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .search-result-item.selected .check-icon {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
        }

        .search-footer {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        .search-footer button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-selected {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
        }

        .cancel-search {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .search-footer button:active {
            transform: scale(0.98);
        }

        /* Модалка количества */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            z-index: 1100;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .quick-weights {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .weight-btn {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            text-align: center;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .weight-btn:active {
            transform: scale(0.95);
            background: rgba(255, 107, 107, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .modal-btn:active {
            transform: scale(0.97);
        }

        /* Анимация появления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .summary, .search-btn, .diary-item {
            animation: fadeInUp 0.4s ease forwards;
        }

        .diary-item:nth-child(1) { animation-delay: 0.05s; }
        .diary-item:nth-child(2) { animation-delay: 0.1s; }
        .diary-item:nth-child(3) { animation-delay: 0.15s; }
        .diary-item:nth-child(4) { animation-delay: 0.2s; }

        /* Стили для скролла */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <!-- Красивый заголовок -->
        <div class="app-header">
            <h1>🍽️ XP Питание</h1>
            <p>Твой дневник калорий и КБЖУ</p>
        </div>

        <!-- Вкладки приёмов пищи -->
        <div class="meal-tabs">
            <div class="meal-tab active" data-meal="breakfast">🍳 Завтрак</div>
            <div class="meal-tab" data-meal="lunch">🍲 Обед</div>
            <div class="meal-tab" data-meal="dinner">🍽️ Ужин</div>
            <div class="meal-tab" data-meal="snack">🍎 Перекус</div>
        </div>

        <!-- Сводка КБЖУ -->
        <div class="summary" id="summary">
            <div class="summary-header">📊 Загрузка...</div>
        </div>

        <!-- Кнопка добавления продуктов -->
        <button class="search-btn" id="openSearchBtn">
            🔍 <span>Добавить продукты</span>
        </button>

        <!-- Список дневника -->
        <div id="diaryList" class="diary-list"></div>
    </div>

    <!-- Полноэкранный поиск -->
    <div class="fullscreen-search" id="fullscreenSearch">
        <div class="search-header">
            <input type="text" id="searchInput" placeholder="🔍 Поиск продуктов..." autocomplete="off">
            <button class="close-search" id="closeSearchBtn">✖</button>
        </div>
        <div class="search-results" id="searchResults">
            <div class="empty-state">🔍 Начните вводить название продукта</div>
        </div>
        <div class="search-footer">
            <button class="cancel-search" id="cancelSearchBtn">Отмена</button>
            <button class="save-selected" id="saveSelectedBtn">✅ Добавить выбранные</button>
        </div>
    </div>

    <!-- Модалка выбора количества -->
    <div class="modal" id="quantityModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Выберите количество</div>
            <div id="modalOptions" class="quick-weights"></div>
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="confirmQuantity()">✅ Добавить</button>
                <button class="modal-btn cancel" onclick="closeQuantityModal()">❌ Отмена</button>
            </div>
        </div>
    </div>

    <!-- База продуктов -->
    <script src="all_products.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentMeal = 'breakfast';
        let selectedProducts = [];
        let allProducts = [];
        let pendingProduct = null;
        let diary = JSON.parse(localStorage.getItem('xp_diary') || '[]');
        
        const mealNames = {breakfast:'Завтрак', lunch:'Обед', dinner:'Ужин', snack:'Перекус'};
        
        // ========== ЗАГРУЗКА ПРОДУКТОВ ==========
        function loadProducts() {
            if (typeof window.allProducts !== 'undefined' && window.allProducts.length > 0) {
                allProducts = window.allProducts;
                console.log(`✅ Загружено ${allProducts.length} продуктов`);
            } else {
                allProducts = [
                    {"id":1,"name":"🍗 Куриная грудка","calories":165,"protein":31,"fat":3.6,"carbs":0,"unit":"g","default":100},
                    {"id":2,"name":"🥚 Яйцо куриное","calories":155,"protein":13,"fat":11,"carbs":1.1,"unit":"g","default":100},
                    {"id":3,"name":"🥛 Молоко 3.2%","calories":60,"protein":3.2,"fat":3.2,"carbs":4.7,"unit":"g","default":200},
                    {"id":4,"name":"🍞 Хлеб белый","calories":265,"protein":9,"fat":3.2,"carbs":49,"unit":"g","default":100},
                    {"id":5,"name":"🍚 Рис белый","calories":130,"protein":2.7,"fat":0.3,"carbs":28,"unit":"g","default":100},
                    {"id":6,"name":"🥔 Картофель","calories":77,"protein":2,"fat":0.4,"carbs":17,"unit":"g","default":100},
                    {"id":7,"name":"🍌 Банан","calories":89,"protein":1.1,"fat":0.3,"carbs":23,"unit":"g","default":100},
                    {"id":8,"name":"🍎 Яблоко","calories":52,"protein":0.3,"fat":0.2,"carbs":14,"unit":"g","default":100},
                ];
                console.log(`⚠️ Загружено ${allProducts.length} продуктов по умолчанию`);
            }
        }
        
        // ========== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ==========
        document.querySelectorAll('.meal-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMeal = tab.dataset.meal;
                renderDiary();
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });
        
        // ========== ОТКРЫТИЕ ПОИСКА ==========
        document.getElementById('openSearchBtn').addEventListener('click', () => {
            selectedProducts = [];
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '<div class="empty-state">🔍 Начните вводить название продукта</div>';
            document.getElementById('fullscreenSearch').classList.add('active');
            document.getElementById('searchInput').focus();
        });
        
        // ========== ЗАКРЫТИЕ ПОИСКА ==========
        function closeSearch() {
            document.getElementById('fullscreenSearch').classList.remove('active');
        }
        
        document.getElementById('closeSearchBtn').addEventListener('click', closeSearch);
        document.getElementById('cancelSearchBtn').addEventListener('click', closeSearch);
        
        // ========== ПОИСК ПРОДУКТОВ ==========
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchProducts(e.target.value), 300);
        });
        
        function searchProducts(query) {
            query = query.toLowerCase().trim();
            
            if (query.length < 2) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">🔍 Введите минимум 2 символа</div>';
                return;
            }
            
            const results = allProducts.filter(p => p.name.toLowerCase().includes(query));
            
            if (results.length === 0) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">😕 Ничего не найдено</div>';
                return;
            }
            
            const selectedIds = selectedProducts.map(p => p.id);
            
            document.getElementById('searchResults').innerHTML = results.map(p => `
                <div class="search-result-item ${selectedIds.includes(p.id) ? 'selected' : ''}" onclick="toggleProductSelection(${p.id})">
                    <div class="result-info">
                        <div class="result-name">${p.name}</div>
                        <div class="result-calories">🔥 ${p.calories} ккал / 100г</div>
                        <div class="result-macros">🥩 ${p.protein}г | 🧈 ${p.fat}г | 🍚 ${p.carbs}г</div>
                    </div>
                    <div class="check-icon">${selectedIds.includes(p.id) ? '✓' : '+'}</div>
                </div>
            `).join('');
        }
        
        // ========== ВЫБОР ПРОДУКТА ==========
        function toggleProductSelection(productId) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            const existingIndex = selectedProducts.findIndex(p => p.id === productId);
            
            if (existingIndex !== -1) {
                selectedProducts.splice(existingIndex, 1);
            } else {
                selectedProducts.push({...product, quantity: product.default || 100});
            }
            
            searchProducts(document.getElementById('searchInput').value);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ========== СОХРАНЕНИЕ ВЫБРАННЫХ ПРОДУКТОВ ==========
        async function saveSelectedProducts() {
            if (selectedProducts.length === 0) {
                if(tg.showAlert) tg.showAlert('Выберите хотя бы один продукт');
                return;
            }
            
            closeSearch();
            
            for (const product of selectedProducts) {
                await addProductToCart(product);
            }
            
            selectedProducts = [];
            if(tg.showAlert) tg.showAlert(`✅ Добавлено в ${mealNames[currentMeal]}`);
        }
        
        document.getElementById('saveSelectedBtn').addEventListener('click', saveSelectedProducts);
        
        // ========== ДОБАВЛЕНИЕ ПРОДУКТА ==========
        function addProductToCart(product) {
            return new Promise((resolve) => {
                pendingProduct = product;
                showQuantityModal(product, resolve);
            });
        }
        
        function addToDiary(product, quantity) {
            const factor = quantity / 100;
            const calories = Math.round(product.calories * factor);
            const protein = (product.protein * factor).toFixed(1);
            const fat = (product.fat * factor).toFixed(1);
            const carbs = (product.carbs * factor).toFixed(1);
            
            const entry = {
                id: Date.now() + Math.random(),
                name: product.name,
                grams: quantity,
                calories: calories,
                protein: parseFloat(protein),
                fat: parseFloat(fat),
                carbs: parseFloat(carbs),
                meal: currentMeal,
                date: new Date().toDateString()
            };
            
            diary.push(entry);
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            renderDiary();
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        
        // ========== МОДАЛКА КОЛИЧЕСТВА ==========
        let currentResolve = null;
        
        function showQuantityModal(product, resolve) {
            currentResolve = resolve;
            document.getElementById('modalTitle').innerHTML = `⚖️ ${product.name}`;
            document.getElementById('modalOptions').innerHTML = `
                <div class="weight-btn" onclick="selectQuantity(50)">50г</div>
                <div class="weight-btn" onclick="selectQuantity(100)">100г</div>
                <div class="weight-btn" onclick="selectQuantity(150)">150г</div>
                <div class="weight-btn" onclick="selectQuantity(200)">200г</div>
                <div class="weight-btn" onclick="selectQuantity(250)">250г</div>
                <div class="weight-btn" onclick="selectQuantity(300)">300г</div>
            `;
            document.getElementById('quantityModal').classList.add('active');
        }
        
        let selectedQuantity = 100;
        function selectQuantity(qty) {
            selectedQuantity = qty;
            document.querySelectorAll('.weight-btn').forEach(btn => {
                if(btn.innerText === `${qty}г`) {
                    btn.style.background = 'rgba(255, 107, 107, 0.3)';
                } else {
                    btn.style.background = '';
                }
            });
        }
        
        function confirmQuantity() {
            if (pendingProduct) {
                addToDiary(pendingProduct, selectedQuantity);
                if(currentResolve) currentResolve();
                closeQuantityModal();
            }
        }
        
        function closeQuantityModal() {
            document.getElementById('quantityModal').classList.remove('active');
            pendingProduct = null;
            selectedQuantity = 100;
            currentResolve = null;
        }
        
        // ========== УДАЛЕНИЕ ЗАПИСИ ==========
        function deleteEntry(id) {
            diary = diary.filter(e => e.id !== id);
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            renderDiary();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        // ========== ОТОБРАЖЕНИЕ ДНЕВНИКА ==========
        function renderDiary() {
            const today = new Date().toDateString();
            const todayEntries = diary.filter(e => e.date === today);
            const currentMealEntries = todayEntries.filter(e => e.meal === currentMeal);
            
            const total = todayEntries.reduce((acc, e) => {
                acc.calories += e.calories;
                acc.protein += e.protein;
                acc.fat += e.fat;
                acc.carbs += e.carbs;
                return acc;
            }, {calories: 0, protein: 0, fat: 0, carbs: 0});
            
            const goal = 2000;
            const percent = Math.min((total.calories / goal * 100), 100);
            
            document.getElementById('summary').innerHTML = `
                <div class="summary-header">📅 ${new Date().toLocaleDateString('ru-RU')}</div>
                <div class="calories-row">
                    <span>🔥 Калории</span>
                    <span><b style="color: #ff6b6b">${total.calories}</b> / ${goal} ккал</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                <div class="macros-row">
                    <div class="macro-item"><div class="macro-value">🥩 ${total.protein.toFixed(1)}г</div><div class="macro-label">Белки</div></div>
                    <div class="macro-item"><div class="macro-value">🧈 ${total.fat.toFixed(1)}г</div><div class="macro-label">Жиры</div></div>
                    <div class="macro-item"><div class="macro-value">🍚 ${total.carbs.toFixed(1)}г</div><div class="macro-label">Углеводы</div></div>
                </div>
                ${total.calories > goal ? '<div style="color:#f44336;text-align:center;margin-top:12px;font-size:12px;">⚠️ Превышение нормы калорий</div>' : '<div style="text-align:center;margin-top:12px;opacity:0.5;font-size:11px;">✅ Осталось ' + (goal - total.calories) + ' ккал</div>'}
            `;
            
            if (currentMealEntries.length === 0) {
                document.getElementById('diaryList').innerHTML = `<div class="empty-state">🍽️ Нет записей в ${mealNames[currentMeal]}</div>`;
            } else {
                document.getElementById('diaryList').innerHTML = currentMealEntries.map(e => `
                    <div class="diary-item">
                        <div class="diary-info">
                            <div class="diary-name">${e.name}</div>
                            <div class="diary-details">
                                ${e.grams}г | 🔥 ${e.calories} ккал | 🥩${e.protein}г 🧈${e.fat}г 🍚${e.carbs}г
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteEntry(${e.id})">✖</button>
                    </div>
                `).join('');
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        loadProducts();
        renderDiary();
        
        document.getElementById('quantityModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('quantityModal')) {
                closeQuantityModal();
            }
        });
        
        console.log(`🍽️ XP Питание загружено! Продуктов: ${allProducts.length}`);
    </script>
</body>
</html>
