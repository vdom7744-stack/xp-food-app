<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XP Питание</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--tg-theme-bg-color,#fff);
            color:var(--tg-theme-text-color,#000);
            padding:12px;
            min-height:100vh;
        }
        
        .meal-tabs{
            display:flex;
            gap:8px;
            margin-bottom:16px;
            background:var(--tg-theme-secondary-bg-color,#f0f0f0);
            padding:8px;
            border-radius:12px;
            position:sticky;
            top:0;
            z-index:10;
        }
        .meal-tab{
            flex:1;
            padding:10px;
            text-align:center;
            border-radius:8px;
            cursor:pointer;
            font-weight:500;
        }
        .meal-tab.active{
            background:var(--tg-theme-button-color,#2481cc);
            color:white;
        }
        
        .summary{
            background:var(--tg-theme-secondary-bg-color,#f0f0f0);
            padding:16px;
            border-radius:12px;
            margin-bottom:16px;
        }
        .summary-header{font-weight:bold;margin-bottom:12px;font-size:16px}
        .calories-row{display:flex;justify-content:space-between;margin-bottom:8px}
        .progress-bar{height:10px;background:rgba(128,128,128,0.3);border-radius:5px;overflow:hidden;margin:10px 0}
        .progress-fill{height:100%;background:var(--tg-theme-button-color,#2481cc);transition:width 0.3s}
        .macros-row{display:flex;justify-content:space-around;margin-top:12px;gap:12px}
        .macro-item{text-align:center;flex:1}
        .macro-value{font-weight:bold;font-size:16px}
        .macro-label{font-size:12px;opacity:0.7}
        
        .search-container{
            background:var(--tg-theme-secondary-bg-color,#f0f0f0);
            border-radius:12px;
            padding:12px;
            margin-bottom:16px;
        }
        .search-box{
            width:100%;
            padding:12px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:25px;
            background:var(--tg-theme-bg-color,#fff);
            color:var(--tg-theme-text-color,#000);
        }
        .search-box:focus{outline:none;border-color:var(--tg-theme-button-color,#2481cc)}
        
        .food-list{
            max-height:300px;
            overflow-y:auto;
            margin-top:12px;
        }
        .food-item{
            background:var(--tg-theme-bg-color,#fff);
            padding:12px;
            margin-bottom:8px;
            border-radius:12px;
            cursor:pointer;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .food-item.selected{
            background:rgba(36,129,204,0.1);
            border:1px solid var(--tg-theme-button-color,#2481cc);
        }
        .food-info{flex:1}
        .food-name{font-weight:bold;font-size:16px;margin-bottom:4px}
        .food-calories{font-size:12px;opacity:0.7}
        .food-macros{display:flex;gap:12px;font-size:12px;margin-top:4px}
        .select-indicator{
            width:24px;
            height:24px;
            border-radius:12px;
            background:#ddd;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:14px;
        }
        .food-item.selected .select-indicator{
            background:var(--tg-theme-button-color,#2481cc);
            color:white;
        }
        
        .cart{
            background:var(--tg-theme-secondary-bg-color,#f0f0f0);
            border-radius:12px;
            padding:12px;
            margin-bottom:16px;
            position:sticky;
            bottom:0;
        }
        .cart-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:12px;
            font-weight:bold;
        }
        .cart-items{
            max-height:200px;
            overflow-y:auto;
        }
        .cart-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:8px 0;
            border-bottom:1px solid rgba(128,128,128,0.2);
        }
        .cart-item-info{flex:1}
        .cart-item-name{font-weight:500}
        .cart-item-details{font-size:12px;opacity:0.7}
        .quantity-control{
            display:flex;
            align-items:center;
            gap:10px;
            margin:0 10px;
        }
        .quantity-btn{
            width:30px;
            height:30px;
            border-radius:15px;
            background:var(--tg-theme-button-color,#2481cc);
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }
        .remove-item{
            background:#f44336;
            color:white;
            border:none;
            padding:5px 10px;
            border-radius:8px;
            cursor:pointer;
        }
        .save-btn{
            width:100%;
            padding:14px;
            background:linear-gradient(135deg,#11998e,#38ef7d);
            color:white;
            border:none;
            border-radius:12px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            margin-top:12px;
        }
        
        .diary-list{
            margin-bottom:16px;
        }
        .diary-item{
            background:var(--tg-theme-secondary-bg-color,#f0f0f0);
            padding:12px;
            margin-bottom:8px;
            border-radius:12px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .diary-info{flex:1}
        .diary-name{font-weight:bold;margin-bottom:4px}
        .diary-details{font-size:12px;opacity:0.7}
        .delete-btn{
            background:#f44336;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:8px;
            cursor:pointer;
        }
        .empty-state{text-align:center;padding:40px;opacity:0.5}
        
        .modal{
            display:none;
            position:fixed;
            top:0;
            left:0;
            right:0;
            bottom:0;
            background:rgba(0,0,0,0.5);
            align-items:center;
            justify-content:center;
            z-index:1000;
        }
        .modal.active{display:flex}
        .modal-content{
            background:var(--tg-theme-bg-color,#fff);
            border-radius:20px;
            padding:20px;
            width:90%;
            max-width:320px;
        }
        .modal-title{font-weight:bold;font-size:18px;margin-bottom:16px;text-align:center}
        .quick-weights{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
        .weight-btn{
            background:var(--tg-theme-secondary-bg-color,#f0f0f0);
            padding:12px;
            text-align:center;
            border-radius:10px;
            cursor:pointer;
        }
        .modal-buttons{display:flex;gap:10px;margin-top:16px}
        .modal-btn{
            flex:1;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:500;
        }
        .modal-btn.confirm{background:var(--tg-theme-button-color,#2481cc);color:white}
        .modal-btn.cancel{background:var(--tg-theme-secondary-bg-color,#f0f0f0)}
    </style>
</head>
<body>
    <div class="meal-tabs">
        <div class="meal-tab active" data-meal="breakfast">🍳 Завтрак</div>
        <div class="meal-tab" data-meal="lunch">🍲 Обед</div>
        <div class="meal-tab" data-meal="dinner">🍽️ Ужин</div>
        <div class="meal-tab" data-meal="snack">🍎 Перекус</div>
    </div>

    <div class="summary" id="summary">📊 Загрузка...</div>

    <div class="search-container">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск продуктов..." autocomplete="off">
        <div id="searchResults" class="food-list"></div>
    </div>

    <div class="cart" id="cart" style="display:none">
        <div class="cart-header">
            <span>🛒 Выбранные продукты</span>
            <span id="cartCount">0</span>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <button class="save-btn" onclick="saveAllToDiary()">💾 Сохранить все в дневник</button>
    </div>

    <div id="diaryList" class="diary-list"></div>

    <div class="modal" id="quantityModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Выберите количество</div>
            <div id="modalOptions" class="quick-weights"></div>
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="confirmQuantity()">✅ Добавить</button>
                <button class="modal-btn cancel" onclick="closeQuantityModal()">❌ Отмена</button>
            </div>
        </div>
    </div>

    <!-- ⭐ ПОДКЛЮЧАЕМ ПРОДУКТЫ ИЗ МАГНИТА (СПАРСЕННЫЕ ДАННЫЕ) ⭐ -->
    <script src="magnit_products.js"></script>
    <script src="vkusnoitochka_products.js"></script>
    <script src="dodopizza_products.js"></script>
    <script src="burgerking_products.js"></script>
    <script src="perekrestok_products.js"></script>
    <script src="homemade_meals.js"></script>
    <script src="mybox_products.js"></script>
    <script src="kfc_products.js"></script>
    <!-- Кофейни -->
<script src="onepricecoffee_products.js"></script>
<script src="surfcoffee_products.js"></script>
<script src="shokoladnitsa_products.js"></script>
<script src="coffeemania_products.js"></script>
<!-- Pims и Бабл Ти -->
<script src="pims_products.js"></script>
<script src="bubbletea_products.js"></script>
<!-- Новые категории -->
<script src="alcohol_products.js"></script>
<script src="energy_drinks_products.js"></script>
<script src="sport_nutrition_products.js"></script>
<script src="plant_milk_products.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        // ========== ОСНОВНОЙ МАССИВ ПРОДУКТОВ ==========
        // ВАШИ СУЩЕСТВУЮЩИЕ ПРОДУКТЫ (базовые)
        let products = [
            {"id":1,"name":"Сыр Моя Цена","calories":327,"protein":24.5,"fat":25.5,"carbs":0,"unit":"g","default":100},
            {"id":2,"name":"Сыр Белебеевский","calories":347,"protein":27,"fat":26.5,"carbs":0,"unit":"g","default":100},
            {"id":3,"name":"Творог Мама Лама","calories":105,"protein":7.9,"fat":3.8,"carbs":9.7,"unit":"g","default":100},
            {"id":4,"name":"Йогурт Греческий","calories":63,"protein":7,"fat":2,"carbs":4.2,"unit":"g","default":140},
            {"id":32,"name":"🍔 Гамбургер","calories":251,"protein":13,"fat":8.8,"carbs":29,"unit":"pcs","options":[1,2,3,4,5]},
            {"id":33,"name":"🍔 Чизбургер","calories":302,"protein":16,"fat":13,"carbs":31,"unit":"pcs","options":[1,2,3,4,5]},
            {"id":34,"name":"🍔 Чикенбургер","calories":339,"protein":16,"fat":13,"carbs":31,"unit":"pcs","options":[1,2,3,4,5]},
            {"id":35,"name":"🍔 Гранд","calories":514,"protein":30,"fat":26,"carbs":38,"unit":"pcs","options":[1,2,3,4,5]},
            {"id":48,"name":"🍔 Биг Спешиал","calories":751,"protein":43,"fat":38,"carbs":59,"unit":"pcs","options":[1,2,3,4,5]},
            {"id":93,"name":"🍔 Гамбургер Вкусно и Точка","calories":251,"protein":13,"fat":8.8,"carbs":29,"unit":"pcs","options":[1,2,3,4,5]},
            {"id":94,"name":"🍔 Чизбургер Вкусно и Точка","calories":302,"protein":16,"fat":13,"carbs":31,"unit":"pcs","options":[1,2,3,4,5]},
            {"id":11,"name":"🍕 Маргарита","calories":235,"protein":9.8,"fat":7.6,"carbs":30.5,"unit":"pcs","options":[1,2,3,4]},
            {"id":12,"name":"🍕 Пепперони","calories":283,"protein":11.5,"fat":11.4,"carbs":31.9,"unit":"pcs","options":[1,2,3,4]},
            {"id":13,"name":"🍕 Сырная","calories":292,"protein":10.8,"fat":10.6,"carbs":36.7,"unit":"pcs","options":[1,2,3,4]},
            {"id":14,"name":"🍕 Гавайская","calories":246,"protein":11.3,"fat":9.6,"carbs":29.7,"unit":"pcs","options":[1,2,3,4]},
            {"id":15,"name":"🍕 Мясная","calories":257,"protein":11.3,"fat":9.6,"carbs":29.7,"unit":"pcs","options":[1,2,3,4]},
            {"id":37,"name":"🥤 Молочный коктейль","calories":126,"protein":3.3,"fat":7.1,"carbs":11.3,"unit":"pcs","options":[1,2,3]},
            {"id":38,"name":"☕ Капучино","calories":55,"protein":2.8,"fat":3,"carbs":4,"unit":"pcs","options":[1,2,3]},
            {"id":31,"name":"🍟 Картофель Фри","calories":330,"protein":3.9,"fat":16,"carbs":41,"unit":"g","default":150},
            {"id":22,"name":"🥔 Картофель из печи","calories":221,"protein":3.8,"fat":6.8,"carbs":34.9,"unit":"g","default":150},
            {"id":36,"name":"🥫 Сырный соус","calories":90,"protein":1,"fat":9,"carbs":2,"unit":"pcs","options":[1,2,3]},
        ];
        
        // ПРОДУКТЫ ИЗ МАГНИТА БУДУТ ДОБАВЛЕНЫ АВТОМАТИЧЕСКИ ЧЕРЕЗ magnit_products.js
        // Файл magnit_products.js должен содержать функцию addMagnitProducts()
        // которая добавляет продукты в массив products
        
        let currentMeal = 'breakfast';
        let cart = [];
        let pendingProduct = null;
        
        const mealNames = {breakfast:'Завтрак', lunch:'Обед', dinner:'Ужин', snack:'Перекус'};
        let diary = JSON.parse(localStorage.getItem('xp_diary') || '[]');
        
        // Переключение вкладки
        document.querySelectorAll('.meal-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMeal = tab.dataset.meal;
                renderDiary();
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });
        
        // Поиск
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchFoods(e.target.value), 300);
        });
        
        function searchFoods(query) {
            query = query.toLowerCase().trim();
            if (query.length < 2) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            const results = products.filter(p => p.name.toLowerCase().includes(query));
            if (results.length === 0) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">😕 Ничего не найдено</div>';
                return;
            }
            
            const cartIds = cart.map(item => item.id);
            document.getElementById('searchResults').innerHTML = results.map(p => `
                <div class="food-item ${cartIds.includes(p.id) ? 'selected' : ''}" onclick="addToCart(${p.id})">
                    <div class="food-info">
                        <div class="food-name">${p.name}</div>
                        <div class="food-calories">🔥 ${p.calories} ккал / ${p.unit === 'pcs' ? 'шт' : '100г'}</div>
                        <div class="food-macros">🥩 ${p.protein}г | 🧈 ${p.fat}г | 🍚 ${p.carbs}г</div>
                    </div>
                    <div class="select-indicator">${cartIds.includes(p.id) ? '✓' : '+'}</div>
                </div>
            `).join('');
            
            document.getElementById('searchInput').blur();
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                cart = cart.filter(item => item.id !== productId);
                renderCart();
                searchFoods(document.getElementById('searchInput').value);
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                return;
            }
            
            if (product.unit === 'pcs') {
                pendingProduct = product;
                showQuantityModal(product);
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    calories: product.calories,
                    protein: product.protein,
                    fat: product.fat,
                    carbs: product.carbs,
                    quantity: product.default || 100,
                    unit: product.unit
                });
                renderCart();
                searchFoods(document.getElementById('searchInput').value);
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        function showQuantityModal(product) {
            document.getElementById('modalTitle').innerHTML = `🍔 ${product.name}`;
            const optionsHtml = product.options.map(opt => `
                <div class="weight-btn" onclick="selectQuantity(${opt})">${opt} шт</div>
            `).join('');
            document.getElementById('modalOptions').innerHTML = optionsHtml;
            document.getElementById('quantityModal').classList.add('active');
        }
        
        let selectedQuantity = 1;
        function selectQuantity(qty) {
            selectedQuantity = qty;
            document.querySelectorAll('.weight-btn').forEach(btn => {
                btn.style.border = btn.innerText === `${qty} шт` ? '2px solid #2481cc' : 'none';
            });
        }
        
        function confirmQuantity() {
            if (pendingProduct) {
                cart.push({
                    id: pendingProduct.id,
                    name: pendingProduct.name,
                    calories: pendingProduct.calories,
                    protein: pendingProduct.protein,
                    fat: pendingProduct.fat,
                    carbs: pendingProduct.carbs,
                    quantity: selectedQuantity,
                    unit: 'pcs'
                });
                renderCart();
                searchFoods(document.getElementById('searchInput').value);
                closeQuantityModal();
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        }
        
        function closeQuantityModal() {
            document.getElementById('quantityModal').classList.remove('active');
            pendingProduct = null;
            selectedQuantity = 1;
        }
        
        function updateCartItemQuantity(productId, delta) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                const newQty = item.quantity + delta;
                if (newQty >= 1) {
                    item.quantity = newQty;
                    renderCart();
                }
            }
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            renderCart();
            searchFoods(document.getElementById('searchInput').value);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function renderCart() {
            const cartDiv = document.getElementById('cart');
            const cartItemsDiv = document.getElementById('cartItems');
            const cartCountSpan = document.getElementById('cartCount');
            
            if (cart.length === 0) {
                cartDiv.style.display = 'none';
                return;
            }
            
            cartDiv.style.display = 'block';
            cartCountSpan.innerText = cart.length;
            
            cartItemsDiv.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-details">
                            ${item.unit === 'pcs' ? `${item.quantity} шт` : `${item.quantity}г`} | 
                            🔥 ${item.unit === 'pcs' ? Math.round(item.calories * item.quantity) : Math.round(item.calories * item.quantity / 100)} ккал
                        </div>
                    </div>
                    ${item.unit === 'pcs' ? `
                        <div class="quantity-control">
                            <button class="quantity-btn" onclick="updateCartItemQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateCartItemQuantity(${item.id}, 1)">+</button>
                        </div>
                    ` : ''}
                    <button class="remove-item" onclick="removeFromCart(${item.id})">✖️</button>
                </div>
            `).join('');
        }
        
        function saveAllToDiary() {
            if (cart.length === 0) {
                if(tg.showAlert) tg.showAlert('Корзина пуста');
                return;
            }
            
            const today = new Date().toDateString();
            
            for (const item of cart) {
                let calories, protein, fat, carbs;
                
                if (item.unit === 'pcs') {
                    calories = Math.round(item.calories * item.quantity);
                    protein = (item.protein * item.quantity).toFixed(1);
                    fat = (item.fat * item.quantity).toFixed(1);
                    carbs = (item.carbs * item.quantity).toFixed(1);
                } else {
                    const factor = item.quantity / 100;
                    calories = Math.round(item.calories * factor);
                    protein = (item.protein * factor).toFixed(1);
                    fat = (item.fat * factor).toFixed(1);
                    carbs = (item.carbs * factor).toFixed(1);
                }
                
                const entry = {
                    id: Date.now() + Math.random(),
                    name: item.name,
                    grams: item.unit === 'pcs' ? item.quantity : item.quantity,
                    unit: item.unit,
                    calories: calories,
                    protein: parseFloat(protein),
                    fat: parseFloat(fat),
                    carbs: parseFloat(carbs),
                    meal: currentMeal,
                    date: today
                };
                diary.push(entry);
            }
            
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            cart = [];
            renderCart();
            renderDiary();
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
            
            if(tg.showAlert) tg.showAlert(`✅ Добавлено в ${mealNames[currentMeal]}`);
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        
        function deleteEntry(id) {
            diary = diary.filter(e => e.id !== id);
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            renderDiary();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function renderDiary() {
            const today = new Date().toDateString();
            const todayEntries = diary.filter(e => e.date === today);
            const currentMealEntries = todayEntries.filter(e => e.meal === currentMeal);
            
            const total = todayEntries.reduce((acc, e) => {
                acc.calories += e.calories;
                acc.protein += e.protein;
                acc.fat += e.fat;
                acc.carbs += e.carbs;
                return acc;
            }, {calories: 0, protein: 0, fat: 0, carbs: 0});
            
            const goal = 2000;
            const percent = Math.min((total.calories / goal * 100), 100);
            
            document.getElementById('summary').innerHTML = `
                <div class="summary-header">📊 ${new Date().toLocaleDateString('ru-RU')}</div>
                <div class="calories-row">
                    <span>🔥 Калории</span>
                    <span><b>${total.calories}</b> / ${goal} ккал</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                <div class="macros-row">
                    <div class="macro-item"><div class="macro-value">🥩 ${total.protein.toFixed(1)}г</div><div class="macro-label">Белки</div></div>
                    <div class="macro-item"><div class="macro-value">🧈 ${total.fat.toFixed(1)}г</div><div class="macro-label">Жиры</div></div>
                    <div class="macro-item"><div class="macro-value">🍚 ${total.carbs.toFixed(1)}г</div><div class="macro-label">Углеводы</div></div>
                </div>
                ${total.calories > goal ? '<div style="color:#f44336;text-align:center;margin-top:8px">⚠️ Превышение нормы!</div>' : ''}
            `;
            
            if (currentMealEntries.length === 0) {
                document.getElementById('diaryList').innerHTML = `<div class="empty-state">🍽️ Нет записей в ${mealNames[currentMeal]}</div>`;
            } else {
                document.getElementById('diaryList').innerHTML = currentMealEntries.map(e => `
                    <div class="diary-item">
                        <div class="diary-info">
                            <div class="diary-name">${e.name}</div>
                            <div class="diary-details">
                                ${e.unit === 'pcs' ? `${e.grams} шт` : `${e.grams}г`} | 
                                🔥 ${e.calories} ккал | 
                                🥩${e.protein}г 🧈${e.fat}г 🍚${e.carbs}г
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteEntry(${e.id})">✖️</button>
                    </div>
                `).join('');
            }
        }
        
        document.getElementById('quantityModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('quantityModal')) {
                closeQuantityModal();
            }
        });
        
        renderDiary();
        
        // Выводим статистику в консоль после загрузки всех продуктов
        setTimeout(() => {
            console.log(`📦 Всего продуктов в базе: ${products.length}`);
        }, 100);
    </script>
</body>
</html>
