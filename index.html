<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XP Питание</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);padding:12px;padding-bottom:80px}
        .tabs{display:flex;gap:8px;margin-bottom:16px;background:var(--tg-theme-secondary-bg-color,#f0f0f0);padding:8px;border-radius:12px}
        .tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-weight:500}
        .tab.active{background:var(--tg-theme-button-color,#2481cc);color:white}
        .card{background:var(--tg-theme-secondary-bg-color,#f0f0f0);padding:16px;border-radius:12px;margin-bottom:16px}
        .search-box{width:100%;padding:12px;font-size:16px;border:1px solid #ccc;border-radius:25px;margin-bottom:16px;background:var(--tg-theme-secondary-bg-color,#f0f0f0);color:var(--tg-theme-text-color,#000)}
        .food-list{max-height:400px;overflow-y:auto}
        .food-item{background:var(--tg-theme-secondary-bg-color,#f0f0f0);padding:12px;margin-bottom:8px;border-radius:12px;cursor:pointer}
        .food-item:active{transform:scale(0.98)}
        .food-name{font-weight:bold;font-size:16px;margin-bottom:4px}
        .food-calories{font-size:12px;opacity:0.7;margin-bottom:4px}
        .food-macros{display:flex;gap:12px;font-size:12px}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000}
        .modal.active{display:flex}
        .modal-content{background:var(--tg-theme-bg-color,#fff);border-radius:20px;padding:20px;width:90%;max-width:320px}
        .quick-weights{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
        .weight-btn{background:var(--tg-theme-secondary-bg-color,#f0f0f0);padding:12px;text-align:center;border-radius:10px;cursor:pointer;font-weight:500}
        .btn{width:100%;padding:12px;border:none;border-radius:10px;cursor:pointer;margin-top:10px;font-weight:500}
        .btn-primary{background:var(--tg-theme-button-color,#2481cc);color:white}
        .btn-danger{background:#f44336;color:white;padding:8px 12px}
        .macro-row{display:flex;gap:12px;margin-top:12px;text-align:center}
        .macro-item{flex:1}
        .progress-bar{height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden;margin:10px 0}
        .progress-fill{height:100%;background:#4CAF50;transition:width 0.3s}
        .diary-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--tg-theme-secondary-bg-color,#f0f0f0);margin-bottom:8px;border-radius:12px}
        .diary-info{flex:1}
        .diary-name{font-weight:bold;margin-bottom:4px}
        .diary-details{font-size:12px;opacity:0.7}
        .empty-state{text-align:center;padding:40px;opacity:0.5}
        .meal-selector{display:flex;gap:8px;margin-bottom:16px;background:var(--tg-theme-secondary-bg-color,#f0f0f0);padding:8px;border-radius:12px}
        .meal-btn{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-weight:500}
        .meal-btn.active{background:var(--tg-theme-button-color,#2481cc);color:white}
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('diary')">📝 Дневник</div>
        <div class="tab" onclick="switchTab('search')">🔍 Поиск</div>
    </div>

    <div id="diaryTab">
        <div class="card" id="summary">📊 Загрузка...</div>
        <div id="diaryList"></div>
    </div>

    <div id="searchTab" style="display:none">
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск продуктов..." autocomplete="off" oninput="searchFoods()">
        <div id="searchResults" class="food-list"></div>
    </div>

    <div class="modal" id="weightModal">
        <div class="modal-content">
            <div class="food-name" id="modalFoodName" style="text-align:center;margin-bottom:15px"></div>
            <div class="quick-weights">
                <div class="weight-btn" onclick="setWeight(50)">50г</div>
                <div class="weight-btn" onclick="setWeight(100)">100г</div>
                <div class="weight-btn" onclick="setWeight(150)">150г</div>
                <div class="weight-btn" onclick="setWeight(200)">200г</div>
                <div class="weight-btn" onclick="setWeight(250)">250г</div>
                <div class="weight-btn" onclick="setWeight(300)">300г</div>
            </div>
            <input type="number" id="customWeight" class="search-box" placeholder="Свой вес (г)" value="100">
            <button class="btn btn-primary" onclick="addFood()">✅ Добавить</button>
            <button class="btn" onclick="closeModal()" style="margin-top:10px">❌ Отмена</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
        
        // ПРОДУКТЫ (все 162 продукта - правильный формат)
        const products = [
            {"id":1,"name":"Сыр Моя Цена Российский Весовой","calories":327,"protein":24.5,"fat":25.5,"carbs":0},
            {"id":2,"name":"Сыр Белебеевский 45% 190Г","calories":347,"protein":27,"fat":26.5,"carbs":0},
            {"id":3,"name":"Сыр Pretto Рикотта 45% 200Г","calories":139,"protein":7,"fat":10.6,"carbs":4},
            {"id":4,"name":"Сыр Вкуснотеево Тильзитер Премиум 45% 200Г","calories":329,"protein":25.5,"fat":25,"carbs":0},
            {"id":5,"name":"Сыр Вкуснотеево Тёртый Микс 4 Сыра 45% 150Г","calories":344,"protein":25,"fat":26.5,"carbs":1.2},
            {"id":6,"name":"Пепперони","calories":283,"protein":11.5,"fat":11.4,"carbs":31.9},
            {"id":7,"name":"Сырная","calories":292,"protein":10.8,"fat":10.6,"carbs":36.7},
            {"id":8,"name":"Ветчина И Сыр","calories":282,"protein":10.7,"fat":9.8,"carbs":35.9},
            {"id":9,"name":"Мясная","calories":257,"protein":11.3,"fat":9.6,"carbs":29.7},
            {"id":10,"name":"Гавайская","calories":246,"protein":11.3,"fat":9.6,"carbs":29.7},
            {"id":11,"name":"Маргарита","calories":235,"protein":9.8,"fat":7.6,"carbs":30.5},
            {"id":12,"name":"Бургер-Пицца","calories":221,"protein":8.3,"fat":7.3,"carbs":29},
            {"id":13,"name":"Четыре Сезона","calories":260,"protein":10.5,"fat":9.5,"carbs":32},
            {"id":14,"name":"Двойной Пепперони","calories":290,"protein":12,"fat":12,"carbs":33},
            {"id":15,"name":"Кисло-Сладкий Цыпленок","calories":238,"protein":10.5,"fat":8.5,"carbs":30},
            {"id":16,"name":"Цыпленок Барбекю","calories":245,"protein":11,"fat":8,"carbs":31},
            {"id":17,"name":"Пепперони Фреш С Томатами","calories":275,"protein":11,"fat":10.5,"carbs":32.5},
            {"id":18,"name":"Овощи И Грибы","calories":215,"protein":8,"fat":6.5,"carbs":29},
            {"id":19,"name":"Ветчина И Грибы","calories":260,"protein":10.5,"fat":9,"carbs":33},
            {"id":20,"name":"Додстер","calories":211,"protein":11.9,"fat":9.9,"carbs":17.1},
            {"id":21,"name":"Дэнвич Ветчина И Сыр","calories":267,"protein":11,"fat":11.2,"carbs":28.9},
            {"id":22,"name":"Картофель Из Печи","calories":221,"protein":3.8,"fat":6.8,"carbs":34.9},
            {"id":23,"name":"Куриные Наггетсы","calories":267,"protein":11.8,"fat":14.2,"carbs":21.3},
            {"id":24,"name":"Салат Цезарь","calories":118,"protein":9.6,"fat":5.5,"carbs":6.8},
            {"id":25,"name":"Сырные Палочки","calories":320,"protein":12,"fat":18,"carbs":25},
            {"id":26,"name":"Крылья Барбекю","calories":280,"protein":16,"fat":15,"carbs":20},
            {"id":27,"name":"Чизкейк Нью-Йорк","calories":341,"protein":6.9,"fat":22.1,"carbs":28.5},
            {"id":28,"name":"Маффин Три Шоколада","calories":350,"protein":5,"fat":15,"carbs":48},
            {"id":29,"name":"Фондан","calories":430,"protein":5.2,"fat":26,"carbs":43},
            {"id":30,"name":"Кофе Капучино","calories":55,"protein":2.8,"fat":3,"carbs":4},
            {"id":31,"name":"Картофель Фри","calories":330,"protein":3.9,"fat":16,"carbs":41},
            {"id":32,"name":"Гамбургер","calories":251,"protein":13,"fat":8.8,"carbs":29},
            {"id":33,"name":"Чизбургер","calories":302,"protein":16,"fat":13,"carbs":31},
            {"id":34,"name":"Чикенбургер","calories":339,"protein":16,"fat":13,"carbs":31},
            {"id":35,"name":"Гранд","calories":514,"protein":30,"fat":26,"carbs":38},
            {"id":36,"name":"Соус Сырный","calories":90,"protein":1,"fat":9,"carbs":2},
            {"id":37,"name":"Соус Барбекю","calories":47,"protein":0,"fat":0,"carbs":11},
            {"id":38,"name":"Соус Чесночный","calories":84,"protein":0,"fat":8,"carbs":3},
            {"id":39,"name":"Кетчуп","calories":36,"protein":1,"fat":0,"carbs":8},
            {"id":40,"name":"Молочный Коктейль","calories":126,"protein":3.3,"fat":7.1,"carbs":11.3}
        ];
        
        let currentMeal = 'breakfast';
        let selectedFood = null;
        let diary = JSON.parse(localStorage.getItem('xp_diary') || '[]');
        
        const mealNames = {breakfast:'Завтрак', lunch:'Обед', dinner:'Ужин', snack:'Перекус'};
        
        // Выбор приема пищи
        const mealSelector = document.createElement('div');
        mealSelector.className = 'meal-selector';
        mealSelector.innerHTML = `
            <div class="meal-btn active" data-meal="breakfast">🍳 Завтрак</div>
            <div class="meal-btn" data-meal="lunch">🍲 Обед</div>
            <div class="meal-btn" data-meal="dinner">🍽️ Ужин</div>
            <div class="meal-btn" data-meal="snack">🍎 Перекус</div>
        `;
        document.getElementById('diaryTab').insertBefore(mealSelector, document.getElementById('diaryTab').firstChild);
        
        document.querySelectorAll('.meal-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMeal = btn.dataset.meal;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('diaryTab').style.display = tab === 'diary' ? 'block' : 'none';
            document.getElementById('searchTab').style.display = tab === 'search' ? 'block' : 'none';
            event.target.classList.add('active');
            if (tab === 'diary') renderDiary();
        }
        
        function searchFoods() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (query.length < 2) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            const results = products.filter(p => p.name.toLowerCase().includes(query));
            if (results.length === 0) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">😕 Ничего не найдено</div>';
                return;
            }
            document.getElementById('searchResults').innerHTML = results.map(p => `
                <div class="food-item" onclick="showWeightModal(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.calories}, ${p.protein}, ${p.fat}, ${p.carbs})">
                    <div class="food-name">${p.name}</div>
                    <div class="food-calories">🔥 ${p.calories} ккал / 100г</div>
                    <div class="food-macros">🥩 ${p.protein}г | 🧈 ${p.fat}г | 🍚 ${p.carbs}г</div>
                </div>
            `).join('');
        }
        
        function showWeightModal(id, name, calories, protein, fat, carbs) {
            selectedFood = {id, name, calories, protein, fat, carbs};
            document.getElementById('modalFoodName').innerHTML = `✅ ${name}`;
            document.getElementById('weightModal').classList.add('active');
        }
        
        function setWeight(grams) {
            document.getElementById('customWeight').value = grams;
        }
        
        function addFood() {
            const grams = parseInt(document.getElementById('customWeight').value);
            if (!selectedFood || isNaN(grams) || grams <= 0 || grams > 5000) {
                if(tg.showAlert) tg.showAlert('❌ Введите корректный вес (1-5000г)');
                return;
            }
            const factor = grams / 100;
            const entry = {
                id: Date.now(),
                name: selectedFood.name,
                grams: grams,
                calories: Math.round(selectedFood.calories * factor),
                protein: (selectedFood.protein * factor).toFixed(1),
                fat: (selectedFood.fat * factor).toFixed(1),
                carbs: (selectedFood.carbs * factor).toFixed(1),
                meal: currentMeal,
                date: new Date().toDateString()
            };
            diary.push(entry);
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            closeModal();
            renderDiary();
            if(tg.showAlert) tg.showAlert(`✅ Добавлено ${grams}г "${selectedFood.name}" в ${mealNames[currentMeal]}`);
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        
        function deleteEntry(id) {
            diary = diary.filter(e => e.id !== id);
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            renderDiary();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        
        function renderDiary() {
            const today = new Date().toDateString();
            const todayEntries = diary.filter(e => e.date === today);
            const total = todayEntries.reduce((acc, e) => {
                acc.calories += e.calories;
                acc.protein += parseFloat(e.protein);
                acc.fat += parseFloat(e.fat);
                acc.carbs += parseFloat(e.carbs);
                return acc;
            }, {calories: 0, protein: 0, fat: 0, carbs: 0});
            const goal = 2000;
            const percent = Math.min((total.calories / goal * 100), 100);
            document.getElementById('summary').innerHTML = `
                <div>📊 ${new Date().toLocaleDateString('ru-RU')}</div>
                <div style="display:flex;justify-content:space-between;margin:10px 0">
                    <span>🔥 Калории</span>
                    <span><b>${total.calories}</b> / ${goal} ккал</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                <div class="macro-row">
                    <div class="macro-item"><div>🥩 ${total.protein.toFixed(1)}г</div><div>Белки</div></div>
                    <div class="macro-item"><div>🧈 ${total.fat.toFixed(1)}г</div><div>Жиры</div></div>
                    <div class="macro-item"><div>🍚 ${total.carbs.toFixed(1)}г</div><div>Углеводы</div></div>
                </div>
                ${total.calories > goal ? '<div style="color:#f44336;text-align:center;margin-top:8px">⚠️ Превышение нормы!</div>' : ''}
            `;
            const meals = ['breakfast', 'lunch', 'dinner', 'snack'];
            let html = '';
            for (const meal of meals) {
                const mealEntries = todayEntries.filter(e => e.meal === meal);
                if (mealEntries.length > 0) {
                    html += `<div class="card"><div><b>${mealNames[meal]}</b></div>`;
                    html += mealEntries.map(e => `
                        <div class="diary-item">
                            <div class="diary-info">
                                <div class="diary-name">${e.name}</div>
                                <div class="diary-details">${e.grams}г | 🔥 ${e.calories} ккал | 🥩${e.protein}г 🧈${e.fat}г 🍚${e.carbs}г</div>
                            </div>
                            <button class="btn-danger" onclick="deleteEntry(${e.id})">✖️</button>
                        </div>
                    `).join('');
                    html += `</div>`;
                }
            }
            if (todayEntries.length === 0) {
                html = '<div class="empty-state">🍽️ Добавьте первый прием пищи!</div>';
            }
            document.getElementById('diaryList').innerHTML = html;
        }
        
        function closeModal() {
            document.getElementById('weightModal').classList.remove('active');
            selectedFood = null;
        }
        
        // Инициализация
        renderDiary();
        
        console.log("WebApp загружен успешно!");
    </script>
</body>
</html>
