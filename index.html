<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XP Питание — Дневник КБЖУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #e0e0e0;
            position: relative;
        }

        /* СТОРОННИЙ ФОН — градиент + наложение тёмного тона */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('https://images.unsplash.com/photo-1546483875-ad9014c88eba?q=80&w=1970&auto=format');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.25;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #05050a 0%, #111118 60%, #0a0a12 100%);
            opacity: 0.88;
            z-index: -1;
        }

        /* Главный контейнер — строго, без лишних отступов */
        .main-content {
            padding: 20px 16px 100px;
            max-width: 560px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Шапка — минимум декора */
        .app-header {
            margin-bottom: 24px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 16px;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #ffffff;
            background: none;
            -webkit-text-fill-color: white;
        }

        .app-header p {
            font-size: 12px;
            color: #7e8493;
            margin-top: 6px;
        }

        /* Вкладки — строгие, без размытия */
        .meal-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            background: #13131c;
            padding: 6px;
            border-radius: 48px;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }

        .meal-tab {
            flex: 1;
            padding: 10px 6px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            transition: all 0.2s ease;
            color: #8a8f9e;
            background: transparent;
        }

        .meal-tab.active {
            background: #2c2c3a;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* Карточка сводки — строгая, без градиентов */
        .summary {
            background: #12121c;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 0.5px solid #262633;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
        }

        .summary-header {
            font-size: 13px;
            font-weight: 500;
            color: #7e8493;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }

        .calories-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .calories-row span:first-child {
            font-size: 14px;
            font-weight: 400;
            color: #9ea3b2;
        }

        .calories-row span:last-child {
            font-size: 22px;
            font-weight: 700;
            color: #f5f5f5;
        }

        .calories-row b {
            color: #ff6b6b;
            font-weight: 700;
        }

        /* Прогресс-бар — строгий, без свечений */
        .progress-bar {
            height: 6px;
            background: #23232e;
            border-radius: 10px;
            margin: 14px 0 16px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ff6b6b;
            width: 0%;
            border-radius: 10px;
        }

        /* Макросы — сетка без лишнего декора */
        .macros-row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .macro-item {
            flex: 1;
            background: #0e0e16;
            border-radius: 18px;
            padding: 12px 6px;
            text-align: center;
            border: 0.5px solid #282834;
        }

        .macro-value {
            font-weight: 700;
            font-size: 18px;
            color: #e0e0e0;
        }

        .macro-label {
            font-size: 10px;
            color: #6f7485;
            margin-top: 5px;
            letter-spacing: 0.3px;
        }

        /* Кнопка поиска — тёмная, без иллюзий */
        .search-btn {
            width: 100%;
            padding: 15px 16px;
            background: #1e1e28;
            border: 0.5px solid #323240;
            border-radius: 60px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .search-btn:active {
            background: #2a2a36;
            transform: scale(0.98);
        }

        /* Карточки еды */
        .diary-item {
            background: #111118;
            border: 0.5px solid #282836;
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .diary-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }

        .diary-details {
            font-size: 11px;
            color: #858b9c;
        }

        .delete-btn {
            background: #2a2228;
            border: none;
            color: #ff8888;
            padding: 8px 14px;
            border-radius: 32px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .delete-btn:active {
            background: #3a2a2e;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #6a7080;
            font-size: 13px;
        }

        /* Поиск */
        .fullscreen-search {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0c0c14;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .fullscreen-search.active {
            display: flex;
        }

        .search-header {
            padding: 16px;
            background: #13131c;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 0.5px solid #282834;
        }

        .search-header input {
            flex: 1;
            padding: 14px 18px;
            font-size: 16px;
            border: 0.5px solid #323240;
            border-radius: 32px;
            background: #1a1a24;
            color: white;
            outline: none;
        }

        .search-header input:focus {
            border-color: #ff6b6b;
        }

        .close-search {
            width: 44px;
            height: 44px;
            border-radius: 44px;
            background: #2a2228;
            border: none;
            color: #ff8888;
            font-size: 20px;
            cursor: pointer;
        }

        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .search-result-item {
            background: #111118;
            border: 0.5px solid #282836;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-result-item.selected {
            border-color: #ff6b6b;
            background: #1e1820;
        }

        .result-name {
            font-weight: 600;
        }

        .result-calories {
            font-size: 11px;
            color: #b0b6c7;
            margin-top: 4px;
        }

        .result-macros {
            font-size: 9px;
            color: #6f7485;
            margin-top: 4px;
        }

        .check-icon {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: #1e1e28;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .search-result-item.selected .check-icon {
            background: #ff6b6b;
        }

        .search-footer {
            padding: 16px;
            background: #13131c;
            display: flex;
            gap: 12px;
            border-top: 0.5px solid #282834;
        }

        .search-footer button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 32px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .save-selected {
            background: #ff6b6b;
            color: white;
        }

        .cancel-search {
            background: #23222e;
            color: #b0b6c7;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(5, 5, 8, 0.96);
            align-items: center;
            justify-content: center;
            z-index: 1100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #12121c;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            border: 0.5px solid #323240;
        }

        .modal-title {
            font-weight: 600;
            font-size: 17px;
            text-align: center;
            margin-bottom: 20px;
        }

        .quick-weights {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .weight-btn {
            background: #1a1a24;
            padding: 12px;
            text-align: center;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            border: 0.5px solid #2c2c38;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 32px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-btn.confirm {
            background: #ff6b6b;
            color: white;
        }

        .modal-btn.cancel {
            background: #23222e;
            color: #ccc;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a24;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="app-header">
            <h1>XP Питание</h1>
            <p>дневник КБЖУ</p>
        </div>

        <div class="meal-tabs">
            <div class="meal-tab active" data-meal="breakfast">🍳 Завтрак</div>
            <div class="meal-tab" data-meal="lunch">🍲 Обед</div>
            <div class="meal-tab" data-meal="dinner">🍽️ Ужин</div>
            <div class="meal-tab" data-meal="snack">🍎 Перекус</div>
        </div>

        <div class="summary" id="summary">
            <div class="summary-header">📅 Загрузка...</div>
        </div>

        <button class="search-btn" id="openSearchBtn">
            🔍 Добавить продукты
        </button>

        <div id="diaryList" class="diary-list"></div>
    </div>

    <!-- Поиск -->
    <div class="fullscreen-search" id="fullscreenSearch">
        <div class="search-header">
            <input type="text" id="searchInput" placeholder="Поиск продуктов..." autocomplete="off">
            <button class="close-search" id="closeSearchBtn">✖</button>
        </div>
        <div class="search-results" id="searchResults">
            <div class="empty-state">Начните вводить название</div>
        </div>
        <div class="search-footer">
            <button class="cancel-search" id="cancelSearchBtn">Отмена</button>
            <button class="save-selected" id="saveSelectedBtn">Добавить</button>
        </div>
    </div>

    <!-- Модалка граммовки -->
    <div class="modal" id="quantityModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Выберите вес</div>
            <div id="modalOptions" class="quick-weights"></div>
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="confirmQuantity()">Подтвердить</button>
                <button class="modal-btn cancel" onclick="closeQuantityModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script src="all_products.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let currentMeal = 'breakfast';
        let selectedProducts = [];
        let allProducts = [];
        let pendingProduct = null;
        let currentResolve = null;
        let diary = JSON.parse(localStorage.getItem('xp_diary') || '[]');
        
        const mealNames = {breakfast:'Завтрак', lunch:'Обед', dinner:'Ужин', snack:'Перекус'};
        
        function loadProducts() {
            if(window.allProducts?.length) {
                allProducts = window.allProducts;
            } else {
                allProducts = [
                    {"id":1,"name":"🍗 Куриная грудка","calories":165,"protein":31,"fat":3.6,"carbs":0,"unit":"g","default":100},
                    {"id":2,"name":"🥚 Яйцо куриное","calories":155,"protein":13,"fat":11,"carbs":1.1,"unit":"g","default":100},
                    {"id":3,"name":"🥛 Молоко 3.2%","calories":60,"protein":3.2,"fat":3.2,"carbs":4.7,"unit":"g","default":200},
                    {"id":4,"name":"🍞 Хлеб белый","calories":265,"protein":9,"fat":3.2,"carbs":49,"unit":"g","default":100},
                    {"id":5,"name":"🍚 Рис белый","calories":130,"protein":2.7,"fat":0.3,"carbs":28,"unit":"g","default":100},
                    {"id":6,"name":"🥔 Картофель","calories":77,"protein":2,"fat":0.4,"carbs":17,"unit":"g","default":100},
                    {"id":7,"name":"🍌 Банан","calories":89,"protein":1.1,"fat":0.3,"carbs":23,"unit":"g","default":100},
                    {"id":8,"name":"🍎 Яблоко","calories":52,"protein":0.3,"fat":0.2,"carbs":14,"unit":"g","default":100},
                ];
            }
        }

        function renderDiary() {
            const today = new Date().toDateString();
            const todayEntries = diary.filter(e => e.date === today);
            const currentEntries = todayEntries.filter(e => e.meal === currentMeal);
            
            const total = todayEntries.reduce((acc, e) => {
                acc.calories += e.calories;
                acc.protein += e.protein;
                acc.fat += e.fat;
                acc.carbs += e.carbs;
                return acc;
            }, {calories: 0, protein: 0, fat: 0, carbs: 0});
            
            const goal = 2000;
            const percent = Math.min((total.calories / goal) * 100, 100);
            
            document.getElementById('summary').innerHTML = `
                <div class="summary-header">📅 ${new Date().toLocaleDateString('ru-RU')}</div>
                <div class="calories-row">
                    <span>Калории</span>
                    <span><b>${total.calories}</b> / ${goal} ккал</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                <div class="macros-row">
                    <div class="macro-item"><div class="macro-value">${total.protein.toFixed(1)}г</div><div class="macro-label">Белки</div></div>
                    <div class="macro-item"><div class="macro-value">${total.fat.toFixed(1)}г</div><div class="macro-label">Жиры</div></div>
                    <div class="macro-item"><div class="macro-value">${total.carbs.toFixed(1)}г</div><div class="macro-label">Углеводы</div></div>
                </div>
                ${total.calories > goal ? '<div style="color:#ff6b6b;text-align:center;margin-top:12px;font-size:12px;">⚠️ Превышение нормы</div>' : `<div style="color:#6f7485;text-align:center;margin-top:12px;font-size:11px;">✅ Осталось ${goal - total.calories} ккал</div>`}
            `;
            
            const container = document.getElementById('diaryList');
            if(!currentEntries.length) {
                container.innerHTML = `<div class="empty-state">Нет записей в ${mealNames[currentMeal]}</div>`;
                return;
            }
            
            container.innerHTML = currentEntries.map(e => `
                <div class="diary-item">
                    <div>
                        <div class="diary-name">${e.name}</div>
                        <div class="diary-details">${e.grams}г · 🔥 ${e.calories} ккал · 🥩${e.protein}г 🧈${e.fat}г 🍚${e.carbs}г</div>
                    </div>
                    <button class="delete-btn" onclick="deleteEntry(${e.id})">Удалить</button>
                </div>
            `).join('');
        }

        function deleteEntry(id) {
            diary = diary.filter(e => e.id !== id);
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            renderDiary();
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function addToDiary(product, quantity) {
            const factor = quantity / 100;
            const entry = {
                id: Date.now() + Math.random(),
                name: product.name,
                grams: quantity,
                calories: Math.round(product.calories * factor),
                protein: +(product.protein * factor).toFixed(1),
                fat: +(product.fat * factor).toFixed(1),
                carbs: +(product.carbs * factor).toFixed(1),
                meal: currentMeal,
                date: new Date().toDateString()
            };
            diary.push(entry);
            localStorage.setItem('xp_diary', JSON.stringify(diary));
            renderDiary();
        }

        function closeSearch() { document.getElementById('fullscreenSearch').classList.remove('active'); }
        function openSearch() { 
            selectedProducts = [];
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '<div class="empty-state">Начните вводить название</div>';
            document.getElementById('fullscreenSearch').classList.add('active');
            document.getElementById('searchInput').focus();
        }

        function searchProducts(query) {
            query = query.toLowerCase().trim();
            if(query.length < 2) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">Минимум 2 символа</div>';
                return;
            }
            const results = allProducts.filter(p => p.name.toLowerCase().includes(query));
            if(!results.length) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                return;
            }
            const selectedIds = selectedProducts.map(p => p.id);
            document.getElementById('searchResults').innerHTML = results.map(p => `
                <div class="search-result-item ${selectedIds.includes(p.id) ? 'selected' : ''}" onclick="toggleProductSelection(${p.id})">
                    <div><div class="result-name">${p.name}</div><div class="result-calories">🔥 ${p.calories} ккал / 100г</div><div class="result-macros">🥩${p.protein}г 🧈${p.fat}г 🍚${p.carbs}г</div></div>
                    <div class="check-icon">${selectedIds.includes(p.id) ? '✓' : '+'}</div>
                </div>
            `).join('');
        }

        function toggleProductSelection(id) {
            const product = allProducts.find(p => p.id === id);
            if(!product) return;
            const idx = selectedProducts.findIndex(p => p.id === id);
            if(idx !== -1) selectedProducts.splice(idx,1);
            else selectedProducts.push({...product, quantity: product.default || 100});
            searchProducts(document.getElementById('searchInput').value);
        }

        function saveSelectedProducts() {
            if(!selectedProducts.length) return;
            closeSearch();
            (async () => {
                for(let p of selectedProducts) {
                    await new Promise(resolve => { pendingProduct = p; currentResolve = resolve; showQuantityModal(p); });
                }
                selectedProducts = [];
            })();
        }

        function showQuantityModal(product) {
            document.getElementById('modalTitle').innerHTML = `⚖️ ${product.name}`;
            document.getElementById('modalOptions').innerHTML = [50,100,150,200,250,300].map(w => `<div class="weight-btn" onclick="selectQuantity(${w})">${w}г</div>`).join('');
            document.getElementById('quantityModal').classList.add('active');
        }

        let selectedQuantity = 100;
        function selectQuantity(q) {
            selectedQuantity = q;
            document.querySelectorAll('.weight-btn').forEach(btn => btn.style.background = btn.innerText === `${q}г` ? '#2a2a36' : '');
        }

        function confirmQuantity() {
            if(pendingProduct) addToDiary(pendingProduct, selectedQuantity);
            closeQuantityModal();
            if(currentResolve) currentResolve();
        }

        function closeQuantityModal() {
            document.getElementById('quantityModal').classList.remove('active');
            pendingProduct = null;
            selectedQuantity = 100;
            currentResolve = null;
        }

        document.querySelectorAll('.meal-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMeal = tab.dataset.meal;
                renderDiary();
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });

        document.getElementById('openSearchBtn').addEventListener('click', openSearch);
        document.getElementById('closeSearchBtn').addEventListener('click', closeSearch);
        document.getElementById('cancelSearchBtn').addEventListener('click', closeSearch);
        document.getElementById('saveSelectedBtn').addEventListener('click', saveSelectedProducts);
        
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchProducts(e.target.value), 300);
        });

        loadProducts();
        renderDiary();
    </script>
</body>
</html>
